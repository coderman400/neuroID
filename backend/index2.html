<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Face Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        video {
            width: 320px;
            height: 240px;
            border: 2px solid #333;
            border-radius: 8px;
            margin: 20px auto;
            display: block;
        }
        .similarity-score {
            font-size: 1.5em;
            margin-top: 20px;
            color: #007BFF;
        }
    </style>
</head>
<body>

    <h1>WebSocket Face Verification</h1>

    <video id="video" autoplay playsinline></video>
    <p class="similarity-score" id="score">Waiting for similarity score...</p>

    <script>
        const socket = new WebSocket("ws://localhost:8000/ws");

        socket.onopen = () => {
            console.log("Connected to WebSocket server");
        };

        socket.onmessage = (event) => {
            document.getElementById("score").innerText = `${event.data}`;
        };

        socket.onclose = () => {
            console.log("WebSocket closed");
            document.getElementById("score").innerText = "WebSocket disconnected.";
        };

        async function startVideoStream() {
            const video = document.getElementById("video");
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            try {
                // Start webcam video stream
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                // Send video frames to the WebSocket server
                setInterval(() => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Convert frame to base64 and send to server
                    const base64Image = canvas.toDataURL("image/jpeg").split(",")[1];
                    socket.send(base64Image);
                }, 100);  // Sending frames every 100 ms
            } catch (error) {
                console.error("Error accessing webcam: ", error);
                alert("Please allow access to the webcam.");
            }
        }

        startVideoStream();
    </script>

</body>
</html>
